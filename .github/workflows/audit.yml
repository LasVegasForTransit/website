name: Audit

# Site-quality gates: performance, accessibility, SEO, security, content.
# Each tool is a separate job so the PR check list shows per-dimension status.
#
# Several tools start in soft-fail mode (continue-on-error) because the initial
# baseline (audits/baseline-2026-05-01.md) found pre-existing issues we can't
# fix in this PR. Each soft-fail job has a TODO marking what needs to land
# before it can be promoted to a hard gate.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build site
        uses: ./.github/actions/build-site

  lighthouse:
    name: Lighthouse
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    # TODO: remove once /projects/index.html accessibility score ≥ 0.95
    # (baseline 2026-05-01: found 0.92 — color-contrast on project cards).
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Run Lighthouse
        run: pnpm exec lhci autorun

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-${{ github.sha }}
          path: .lighthouseci/
          if-no-files-found: ignore
          retention-days: 14

  axe:
    name: Accessibility (axe)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # TODO: remove once color-contrast violations resolved (homepage 22 nodes,
    # about 5, contact/strategy 1 each per baseline 2026-05-01).
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm test:install

      - name: Install system deps for headless Chromium
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run axe
        run: pnpm audit:a11y

  html-validate:
    name: HTML validate
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # TODO: remove once baseline html-validate findings resolved
    # (button type, MDX heading-id leading-digit, long titles).
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Run html-validate
        run: pnpm audit:html

  structured-data:
    name: Structured data
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # GATING — baseline 2026-05-01 was clean; regressions block merge.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Validate JSON-LD
        run: pnpm audit:structured-data

  third-party-scan:
    name: Third-party scan
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Reporting only (script always exit 0). Surfaces unintended new
    # off-origin sources in the build for human review.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Scan
        run: pnpm audit:third-party

  deps-audit:
    name: Dependency vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # TODO: promote to hard gate once any high/critical findings cleared.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Audit
        run: pnpm audit --prod --audit-level=high

  content-lint:
    name: Content lint (alex + cspell)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Soft-fail until one clean week, per the audit plan. Findings are
    # advisory and judgment calls; they shouldn't block merge by default.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run alex + cspell
        run: pnpm audit:content
