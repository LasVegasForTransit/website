name: Audit (scheduled)

# Weekly checks that don't belong in PR CI either because they're slow,
# they hit external services that flake, or they make sense only against
# the live production deployment (not a built artifact).

on:
  schedule:
    # Mondays 14:00 UTC ≈ 06:00 Pacific. Early enough to catch flakes
    # before the work week starts, late enough that any deploy from the
    # weekend has settled.
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  external-links:
    name: External link check (lychee)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build site
        uses: ./.github/actions/build-site

      - name: Restore lychee cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Run lychee
        # TODO: pin to a verified SHA after first successful run; using a
        # major-version tag here as the rest of the repo pins by SHA.
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml --cache 'dist/**/*.html' 'docs/**/*.md' 'README.md'
          fail: true

  lighthouse-prod:
    name: Lighthouse vs production
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run Lighthouse against production
        run: |
          pnpm exec lhci autorun \
            --collect.staticDistDir= \
            --collect.url=https://lasvegasfortransit.org/ \
            --collect.url=https://lasvegasfortransit.org/about/ \
            --collect.url=https://lasvegasfortransit.org/vision/ \
            --collect.url=https://lasvegasfortransit.org/projects/ \
            --collect.url=https://lasvegasfortransit.org/events/ \
            --collect.url=https://lasvegasfortransit.org/join/ \
            --collect.url=https://lasvegasfortransit.org/contact/

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-prod-${{ github.run_number }}
          path: .lighthouseci/
          if-no-files-found: ignore
          retention-days: 30

  deps-audit:
    name: Dependency vulnerabilities (main)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Audit (low+)
        run: pnpm audit --prod --audit-level=low

  notify-on-failure:
    name: Open issue on failure
    needs: [external-links, lighthouse-prod, deps-audit]
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Open issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const title = `Scheduled audit failed — ${date}`;
            const body = [
              'The weekly audit run flagged at least one failure.',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Check failed jobs and open a fix PR.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['audit', 'maintenance'],
            });
