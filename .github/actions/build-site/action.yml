name: Build site
description: >
  Run the canonical validation chain (typecheck, lint:check, check:docs) and
  build the static site to ./dist. Uploads the build as an artifact named
  `dist-${{ github.sha }}` for downstream deploy jobs to download.

  Assumes `setup-node-pnpm` has already run in the same job.

runs:
  using: composite
  steps:
    - name: Restore Astro cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: .astro
        key: astro-${{ runner.os }}-${{ hashFiles('astro.config.mjs', 'pnpm-lock.yaml', 'src/content/**') }}
        restore-keys: |
          astro-${{ runner.os }}-

    - name: Typecheck
      shell: bash
      run: pnpm typecheck

    - name: Lint check
      shell: bash
      run: pnpm lint:check

    - name: Validate doc links
      shell: bash
      run: pnpm check:docs

    - name: Build
      shell: bash
      run: pnpm build

    - name: Upload dist artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: dist-${{ github.sha }}
        path: dist/
        if-no-files-found: error
        retention-days: 7
