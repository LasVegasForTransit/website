name: Deploy to Cloudflare Pages
description: >
  Download the dist artifact built by `build-site`, then deploy it to a
  Cloudflare Pages project via wrangler. Wrangler is a pinned devDependency
  (no `pnpm dlx` fetch in CI), so deploys are deterministic.

  Caller must already have `setup-node-pnpm` in the same job and must export
  CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID via the job `env:` block (do
  NOT pass tokens as inputs — composite-action inputs end up in `with:`,
  which serializes into workflow logs).

inputs:
  branch:
    description: Pages branch (e.g. `main` for production, head ref for previews).
    required: true
  project-name:
    description: Cloudflare Pages project name.
    required: false
    default: lvbt-website

outputs:
  url:
    description: The deployment URL parsed from wrangler stdout.
    value: ${{ steps.deploy.outputs.url }}

runs:
  using: composite
  steps:
    - name: Download dist artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: dist-${{ github.sha }}
        path: dist/

    # Job-level `env:` (set by the calling workflow) propagates into composite
    # steps automatically. We deliberately do NOT re-export it here — the
    # `${{ env.X }}` lookup in a composite step's env block doesn't see the
    # caller's job env at evaluation time, so re-exporting overwrites the
    # inherited value with empty.
    - name: Deploy
      id: deploy
      shell: bash
      run: |
        set -euo pipefail
        if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
          echo "::error::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set on the calling job's env block."
          exit 1
        fi
        # Debug: lengths + a CF API probe with the same creds wrangler will use.
        # Not logging the values themselves — masking would scrub them anyway.
        echo "diag: account-id length = ${#CLOUDFLARE_ACCOUNT_ID}"
        echo "diag: api-token length  = ${#CLOUDFLARE_API_TOKEN}"
        probe=$(curl -sS -o /dev/null -w '%{http_code}' \
          "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/${{ inputs.project-name }}" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
        echo "diag: GET pages/projects/${{ inputs.project-name }} -> $probe"
        out=$(pnpm exec wrangler pages deploy dist \
          --project-name='${{ inputs.project-name }}' \
          --branch='${{ inputs.branch }}' \
          --commit-hash='${{ github.sha }}' \
          --commit-message="$(git log -1 --pretty=%s | head -c 200)" \
          2>&1 | tee /dev/stderr)
        # Wrangler prints `Take a peek over at https://<hash>.<project>.pages.dev`.
        url=$(printf '%s\n' "$out" | grep -oE 'https://[a-z0-9-]+\.[a-z0-9-]+\.pages\.dev' | tail -1)
        if [ -z "$url" ]; then
          echo "::warning::Could not parse Pages URL from wrangler output."
          url=""
        fi
        echo "url=$url" >> "$GITHUB_OUTPUT"
